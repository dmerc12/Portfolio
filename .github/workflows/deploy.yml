name: Deploy to AWS S3 and invalidate CloudFront

on:
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Debug AWS permissions
        run: |
          echo "Caller identity:"
          aws sts get-caller-identity
          echo "Attempting to list objects in bucket dtm-portfolio:"
          aws s3api list-objects-v2 --bucket dtm-portfolio --max-items 1 || echo "List failed"
          echo "Attempting to list all buckets (should fail if not authorized):"
          aws s3 ls || echo "List buckets failed"

      - name: Install dependences
        run: cd portfolio && npm ci

      - name: Build static site
        run: cd portfolio && npm run build

      - name: Debug bucket name and test list with secret
        run: |
          echo "Bucket from secret: ${{ secrets.AWS_S3_BUCKET }}"
          aws s3api list-objects-v2 --bucket ${{ secrets.AWS_S3_BUCKET }} --max-items 1

      - name: Sync  files to S3
        run: |
          aws s3 sync ./portfolio/out/ s3://${{ secrets.AWS_S3_BUCKET }}/ --delete

      - name: Create CloudFront invalidation
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
