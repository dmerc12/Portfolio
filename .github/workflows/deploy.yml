name: Deploy to AWS S3 and invalidate CloudFront

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::582381606451:role/github-actions-portfolio
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install dependences
        run: cd portfolio && npm ci

      - name: Build static site
        run: cd portfolio && npm run build

      - name: Sync  files to S3
        run: |
          aws s3 sync portfolio/out/ s3://${{ secrets.AWS_S3_BUCKET }} --delete

      - name: Create CloudFront invalidation
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
