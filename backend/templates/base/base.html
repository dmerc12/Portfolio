{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

        <!-- Bootstrap CSS -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">

        <!-- jQuery first, then Popper.js, then Bootstrap JS -->
        <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>

        <!-- HTMX script -->
        <script src="https://unpkg.com/htmx.org@1.1.0"></script>

        <!-- Other template links -->
        <link href="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/style.min.css" rel="stylesheet" />
        <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>

        <!-- Custom CSS -->
        <link rel="stylesheet" href="{% static 'css/style.css' %}">

        <!-- Favicon -->
        <link rel="icon" href="{% static '143Designs.png' %}">

        <!-- Custom page title -->
        {% block title %}{% endblock title %}
    </head>
    <body class="sb-nav-fixed" hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
        <!-- Navbar -->
        {% include 'base/navbar.html' %}
        <div id="layoutSidenav">
            <!-- Side navbar -->
            {% include 'base/sidenavbar.html' %}
            <div id="layoutSidenav_content">
                <!-- Display error messages -->
                <div class="mx-auto justify-content-center text-center row mt-2">
                    {% include "toast.html" %}
                </div>
                <!-- Page content -->
                {% block content %}{% endblock content %}
                <!-- Footer -->
                {% include 'base/footer.html' %}
            </div>
        </div>
        <!-- Other template scripts -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
        <script src="{% static 'js/scripts.js' %}"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.8.0/Chart.min.js" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/umd/simple-datatables.min.js" crossorigin="anonymous"></script>
        <script src="{% static 'js/datatables.js' %}"></script>
        <script>
            // Automatically close message after 3 seconds
            setTimeout(function() {
                var message = document.getElementById('toastMessage');
                if (message) {
                    message.remove();
                }
            }, 3000);
        </script>
    </body>
</html>
